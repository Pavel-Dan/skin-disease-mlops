name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate demo data
        run: python scripts/generate_demo_data.py --processed-only --processed-per-split 4

      - name: Train smoke model
        run: python -m src.training.train --epochs 1 --batch-size 4 --no-register
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlruns/mlflow.db
          SKIP_MINIO: "true"
          MODEL_ARCH: resnet18

      - name: Run tests
        run: pytest tests/ -q
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlruns/mlflow.db
          SKIP_MINIO: "true"
          MODEL_ARCH: resnet18

      - name: Build Docker image
        run: docker build -t skin-api:ci .

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: |
          kubectl apply --dry-run=client -f k8s/namespace.yaml
          kubectl apply --dry-run=client -f k8s/secrets.yaml.example
          kubectl apply --dry-run=client -f k8s/minio.yaml
          kubectl apply --dry-run=client -f k8s/mlflow.yaml
          kubectl apply --dry-run=client -f k8s/api.yaml
