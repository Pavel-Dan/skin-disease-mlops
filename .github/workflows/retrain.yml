name: Retrain

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate demo data
        run: python scripts/generate_demo_data.py --processed-only --processed-per-split 6

      - name: Run retraining pipeline
        run: python retrain/run.py --force --epochs 1 --skip-drift-check
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlruns/mlflow.db
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}

      - name: Upload retrain artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrain-artifacts
          path: |
            models/best_model.pt
            monitoring/reports/
            data/interim/test_metrics.json
