apiVersion: apps/v1
kind: Deployment
metadata:
  name: skin-api
  namespace: skin-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skin-api
  template:
    metadata:
      labels:
        app: skin-api
    spec:
      containers:
        - name: api
          image: skin-api:local
          imagePullPolicy: IfNotPresent
          env:
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow:5000
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: MODEL_PATH
              value: models/best_model.pt
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: skin-api
  namespace: skin-mlops
spec:
  type: NodePort
  selector:
    app: skin-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
