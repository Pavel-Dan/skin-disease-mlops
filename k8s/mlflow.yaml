apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: skin-mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.22.0
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
          envFrom:
            - secretRef:
                name: minio-credentials
          command: ["mlflow", "server"]
          args:
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - sqlite:///mlflow/mlflow.db
            - --default-artifact-root
            - s3://mlflow/
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: skin-mlops
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
